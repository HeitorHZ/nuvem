<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chuva de Números - Reflexo no Chão + Reflexo das Letras</title>
  <style>
    body {
      margin: 0;
      height: 100vh;
      background: #000;
      overflow: hidden;
      position: relative;
      font-family: monospace;
    }

    .sky {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 68%;
      background: linear-gradient(to bottom, #0a0a0a, #1a1a2e);
    }

    .ground {
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 32%;
      background: linear-gradient(to top, #0a0a0a, #1f1f1f);
      overflow: hidden;
    }

    /* Reflexo geral em TODO o chão */
    .ground::before {
      content: '';
      position: absolute;
      bottom: 0;
      left: 0;
      width: 100%;
      height: 100%;
      background: linear-gradient(
        to top, 
        rgba(100, 200, 255, 0.22) 0%,
        rgba(120, 210, 255, 0.12) 35%,
        rgba(255,255,255,0.06) 70%,
        transparent 95%
      );
      pointer-events: none;
      z-index: 7;
      animation: groundShimmer 9s linear infinite;
    }

    @keyframes groundShimmer {
      0%, 100% { opacity: 0.9; }
      50% { opacity: 1.1; }
    }

    .cloud {
      position: absolute;
      top: 60px;
      left: 50%;
      transform: translateX(-50%);
      width: 400px;
      height: 140px;
      background: #f0f0f0;
      border-radius: 100px;
      box-shadow: 0 20px 50px rgba(255,255,255,0.25);
      z-index: 10;
    }

    .cloud::before,
    .cloud::after {
      content: '';
      position: absolute;
      background: #f0f0f0;
      border-radius: 50%;
    }

    .cloud::before {
      width: 170px;
      height: 170px;
      top: -85px;
      left: 65px;
    }

    .cloud::after {
      width: 130px;
      height: 130px;
      top: -65px;
      right: 75px;
    }

    .rain {
      position: absolute;
      top: 190px;
      left: 50%;
      transform: translateX(-50%);
      width: 380px;
      height: 75vh;
      overflow: hidden;
      z-index: 5;
    }

    .letter {
      position: absolute;
      color: #fff;
      font-size: 18px;           /* ← Diminuído */
      font-weight: bold;
      text-shadow: 0 0 10px rgba(255,255,255,0.85);
      animation: fall linear forwards;
      user-select: none;
    }

    @keyframes fall {
      to {
        transform: translateY(82vh);
      }
    }

    /* Reflexo individual das letras */
    .reflection {
      position: absolute;
      bottom: 14px;
      color: rgba(180, 230, 255, 0.68);
      font-weight: bold;
      text-shadow: 0 0 14px rgba(180, 230, 255, 0.9);
      transform: scaleY(-0.55) scaleX(0.9);
      filter: blur(1.8px);
      pointer-events: none;
      z-index: 8;
      opacity: 0;
      animation: letterRipple 1.9s ease-out forwards;
    }

    @keyframes letterRipple {
      0%   { opacity: 0.72; transform: scaleY(-0.42) scaleX(0.85); }
      35%  { opacity: 0.68; }
      100% { opacity: 0; transform: scaleY(-0.70) scaleX(1.15); }
    }
  </style>
</head>
<body>

  <div class="sky"></div>
  <div class="cloud"></div>
  <div class="rain" id="rain"></div>
  <div class="ground"></div>

  <script>
    const rainContainer = document.getElementById('rain');
    const ground = document.querySelector('.ground');
    const numbersPool = "01234567890123456789".split("");

    function createLetter() {
      const item = document.createElement('div');
      item.classList.add('letter');
      
      item.textContent = numbersPool[Math.floor(Math.random() * numbersPool.length)];
      
      const left = Math.random() * 360 + 20;
      item.style.left = `${left}px`;
      
      const size = Math.random() * 11 + 17;   /* ← Tamanho menor e variado */
      item.style.fontSize = `${size}px`;
      
      const duration = Math.random() * 1.6 + 2.5;
      item.style.animationDuration = `${duration}s`;
      
      item.style.opacity = Math.random() * 0.3 + 0.8;
      
      rainContainer.appendChild(item);

      // Reflexo individual no meio
      setTimeout(() => {
        if (!item.parentNode) return;

        const refl = document.createElement('div');
        refl.classList.add('reflection');
        refl.textContent = item.textContent;
        
        const centerLeft = left + 7;
        refl.style.left = `${centerLeft}px`;
        refl.style.fontSize = `${size * 0.96}px`;

        ground.appendChild(refl);

        setTimeout(() => refl.remove(), 2200);

      }, duration * 820);

      setTimeout(() => item.remove(), duration * 1000 + 300);
    }

    // Chuva de números
    setInterval(() => {
      for (let i = 0; i < 12; i++) {
        createLetter();
      }
    }, 45);

    // Iniciais
    for (let i = 0; i < 70; i++) {
      createLetter();
    }
  </script>

</body>
</html>
